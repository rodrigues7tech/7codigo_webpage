<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7codigo | Aguarde</title>
  <meta name="description" content="Aguarde enquanto a página principal da 7codigo está sendo gerada.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04070b;
      --line: #1c3342;
      --text: #e8f4ff;
      --muted: #8ea9bd;
      --primary: #39ff14;
      --accent: #00d4ff;
      --primary-rgb: 57, 255, 20;
      --accent-rgb: 0, 212, 255;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "JetBrains Mono", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(var(--primary-rgb), 0.15), transparent 42%),
        radial-gradient(circle at 80% 80%, rgba(var(--accent-rgb), 0.15), transparent 46%),
        var(--bg);
      padding: 1rem;
    }

    .panel {
      width: min(680px, 100%);
      border: 1px solid var(--line);
      background: rgba(13, 26, 34, 0.78);
      padding: 1.5rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .logo {
      border: 1px solid rgba(var(--accent-rgb), 0.65);
      color: var(--primary);
      padding: 0.1rem 0.45rem;
      background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.14), rgba(var(--primary-rgb), 0.2));
    }

    h1 {
      margin: 0 0 0.7rem;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      line-height: 1.3;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .loader {
      margin: 1.1rem 0;
      width: 100%;
      height: 10px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
    }

    .loader::before {
      content: "";
      display: block;
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.9), rgba(var(--accent-rgb), 0.9));
      animation: scan 1.1s linear infinite;
    }

    .status {
      font-size: 0.85rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    @keyframes scan {
      from { transform: translateX(-120%); }
      to { transform: translateX(360%); }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand"><span class="logo">&lt;7&gt;</span><span>codigo</span></div>
    <h1>Aguarde, em breve estaremos no ar.</h1>
    <p>Referência: <strong>index.html</strong> em processamento.</p>
    <div class="loader" aria-hidden="true"></div>
    <p class="status">Status: compilando estrutura, estilos e conteúdo.</p>
  </main>
</body>
</html>
